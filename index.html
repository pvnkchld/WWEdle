<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWEdle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
  <div class="main-title-container">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTFyUo-aKOV6nMrTBECjiSxXGnAq0IJzcD4VQ&s" alt="WWE Logo" class="wwe-logo">
    <span class="dle-text"> dle</span>
  </div>

  <p>Đoán đô vật huyền thoại ngày hôm nay!</p>

<p class="legend-text">
  <strong>ERA:</strong> Thời kỳ <strong>BRAND:</strong> Show 
  <strong>DEBUT:</strong> Năm ra mắt <strong>HGT:</strong> Chiều cao 
  <strong>ALIGN:</strong> Phe <strong>RR:</strong> Thắng Royal Rumble chưa?
  <strong>RET?:</strong> Giải nghệ chưa?
</p>
    
  <div class="input-area">
    <input type="text" id="guessInput" placeholder="Nhập tên đô vật..." list="wrestler-list" autocomplete="off">
    <datalist id="wrestler-list"></datalist>
    <button onclick="checkGuess()">ĐOÁN!</button>
  </div>

  <p>Số lần đoán: <span id="countDisplay">0</span></p>

  <div class="board-wrapper">
    <div class="header-row">
      <span>NAME</span>
      <span>ERA</span>
      <span>BRAND</span>
      <span>DEBUT</span>
      <span>HGT</span>
      <span>ALIGN</span>
      <span>RR</span>
      <span>RET?</span>
    </div>

    <div id="resultTable"></div>
  </div>
</div>

<div id="winModal" class="modal">
  <div class="modal-content">
    <h2 class="win-title">CHAMPION!</h2>
    <div id="winMessage"></div>
    <button onclick="location.reload()" class="retry-btn">CHƠI LẠI</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
